<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Árad a Tisza</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            font-size: 32px;
        }

        .section {
            margin: 40px 0;
        }

        .video {
            margin-top: 15px;
        }

        iframe {
            width: 100%;
            height: 315px;
            border: none;
            border-radius: 10px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Árad a Tisza</h1>

    <p>
        Ez nem egy dal — hanem ugyanannak az üzenetnek több arca.
        Hallgasd meg a különböző verziókat, és találd meg azt, ami hozzád szól.
    </p>

    <div class="section">

        <div class="card">
            <h2>Techno verzió</h2>
            <p>Veretős, klubos hangzás, erős dropokkal.</p>

            <div class="video">
                <!-- IDE JÖN A VIDEO -->
                <iframe src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
            </div>
        </div>

    </div>

</div>

</body>
</html>
